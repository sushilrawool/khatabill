<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhataBill | Add Bill</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_bill.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-left"><div class="nav-logo"><img src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/icons/receipt.svg" alt="KhataBill Logo" class="logo" style="width:40px;height:40px;">KhataBill</div></div>
    <div class="nav-right">
        <a href="{{ url_for('dashboard') }}" class="{% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
        <a href="{{ url_for('add_bill') }}" class="{% if request.path == '/add_bill' %}active{% endif %}">Add Bill</a>
        <a href="{{ url_for('add_customer') }}" class="{% if request.path == '/add_customer' %}active{% endif %}">Add Customer</a>
        <a href="{{ url_for('view_customers') }}" class="{% if request.path == '/view_customers' %}active{% endif %}">View Customers</a>
        <a href="{{ url_for('products') }}" class="{% if request.path == '/products' %}active{% endif %}">Products</a>
        <a href="{{ url_for('pending_bills') }}" class="{% if request.path == '/pending_bills' %}active{% endif %}">Pending Bills</a>
        <a href="{{ url_for('reports') }}" class="{% if request.path == '/reports' %}active{% endif %}">Reports</a>
        <a href="{{ url_for('about') }}" class="{% if request.path == '/about' %}active{% endif %}">About Us</a>
        <a href="{{ url_for('gallery') }}" class="{% if request.path == '/gallery' %}active{% endif %}">Gallery</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header">
            <a href="{{ url_for('dashboard') }}" class="back-btn">← Back to Dashboard</a>
            <h2>Add Bill</h2>
        </div>

        <!-- Customer search -->
        <div class="form-group">
            <label>Customer</label>
            <input type="text" id="customer" placeholder="Search customer..." oninput="searchCustomer()">
            <div class="suggestions" id="customerList"></div>
        
        </div>

        <!-- Bill form -->
        <form method="POST" id="billForm">

    <!-- 🔥 IMPORTANT: hidden customer_id MUST be inside form -->
    <input type="hidden" id="customer_id" name="customer_id">

    <table class="product-table">
      <thead>
    <tr>
        <th>Product</th>
        <th>Qty</th>
        <th>Unit</th>   <!-- ✅ NEW -->
        <th>Price</th>
        <th>Total</th>
        <th></th>
    </tr>
</thead>
        <tbody id="billItems"></tbody>
    </table>

    <button type="button" class="add-row" onclick="addRow()">+ Add Product</button>

    <div class="total-box">
        Grand Total : ₹ <span id="grandTotal">0.00</span>
    </div>

    <div class="form-group">
        <label>Payment Status</label>
        <select id="status" name="status" required>
            <option value="">Select</option>
            <option value="PAID">Paid</option>
            <option value="PENDING">Pending</option>
        </select>
    </div>

    <div class="btn-group">
        <button type="submit" class="btn">Save Bill</button>
    </div>
</form>
    </div>
</div>

<!-- Flask data -->
<script id="flaskData" type="application/json">
{
    "customers": {{ customers | tojson | safe }},
    "products": {{ products | tojson | safe }}
}
</script>

<script src="{{ url_for('static', filename='js/add_bill.js') }}"></script>
</body>
</html>
